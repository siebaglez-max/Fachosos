<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito | FACHOSOS</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  background:#000;
  color:#fff;
  font-family:'Oswald',sans-serif;
  padding:40px;
  text-align:center;
}

.item{
  border:1px solid #333;
  padding:20px;
  margin-bottom:20px;
}

img{
  width:150px;
  margin-bottom:10px;
}

button{
  background:none;
  border:1px solid #fff;
  color:#fff;
  padding:8px 14px;
  cursor:pointer;
}

button:hover{
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<h2>🛒 TU CARRITO</h2>
<div id="lista"></div>

<button onclick="borrarTodo()">BORRAR TODO</button>

<script>
let lista = document.getElementById("lista");
let carrito = JSON.parse(localStorage.getItem("favoritos")) || [];

if(carrito.length === 0){
  lista.innerHTML = "<p>😢 No tienes productos en el carrito</p>";
}

carrito.forEach((p,i)=>{
  lista.innerHTML += `
    <div class="item">
      <img src="${p.imagen}">
      <p>${p.nombre}</p>
      <span>${p.precio}</span><br><br>
      <button onclick="eliminar(${i})">ELIMINAR</button>
    </div>
  `;
});

function eliminar(i){
  carrito.splice(i,1);
  localStorage.setItem("favoritos", JSON.stringify(carrito));
  location.reload();
}

function borrarTodo(){
  localStorage.removeItem("favoritos");
  location.reload();
}
</script>

</body>
</html>
