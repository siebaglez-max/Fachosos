<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACHOSOS | Catálogo</title>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  font-family:'Permanent Marker', cursive;
  color:white;
  padding:40px 20px;
  text-align:center;
}

/* ===== TITULO ===== */
h1{
  font-size:42px;
  letter-spacing:4px;
  margin-bottom:50px;
}

/* ===== GRID ===== */
.productos{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:35px;
  max-width:1100px;
  margin:auto;
}

/* ===== CARD ===== */
.card{
  background:#111;
  padding:18px;
  border-radius:15px;
  transition:0.3s ease;
  box-shadow:0 0 25px rgba(0,255,255,0.25);
}

.card:hover{
  transform:scale(1.06);
  box-shadow:0 0 40px rgba(255,0,255,0.45);
}

/* ===== IMAGEN ===== */
.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
}

/* ===== NOMBRE ===== */
.card h3{
  font-size:20px;
  margin-bottom:6px;
}

/* ===== PRECIO ===== */
.precio{
  font-family:'Playfair Display', serif;
  font-size:18px;
  color:#66ccff;
  margin-bottom:10px;
}

/* ===== BOTON WHATSAPP ===== */
.btn-wsp{
  display:inline-block;
  padding:8px 18px;
  background:#000;
  border:1px solid #888;
  color:#ccc;
  text-decoration:none;
  border-radius:8px;
  font-size:14px;
  transition:0.3s;
}

.btn-wsp:hover{
  background:#111;
  border-color:#fff;
  color:#fff;
}

/* ===== BOTON VOLVER ===== */
.btn-volver{
  display:inline-block;
  margin-top:60px;
  padding:10px 28px;
  border:1px solid #777;
  color:#ccc;
  text-decoration:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>CATÁLOGO FACHOSOS</h1>

<div class="productos">

  <div class="card">
    <img src="producto1.jpg" alt="Gorra Negra">
    <h3>Gorra Negra Street</h3>
    <div class="precio">$350 MXN</div>
    <a class="btn-wsp" href="https://wa.me/521XXXXXXXXXX" target="_blank">
      Pedir por WhatsApp
    </a>
  </div>

  <div class="card">
    <img src="producto2.jpg" alt="Playera Blanca">
    <h3>Playera Blanca Oversize</h3>
    <div class="precio">$450 MXN</div>
    <a class="btn-wsp" href="https://wa.me/521XXXXXXXXXX" target="_blank">
      Pedir por WhatsApp
    </a>
  </div>

  <div class="card">
    <img src="producto3.jpg" alt="Sudadera Negra">
    <h3>Sudadera Premium</h3>
    <div class="precio">$800 MXN</div>
    <a class="btn-wsp" href="https://wa.me/521XXXXXXXXXX" target="_blank">
      Pedir por WhatsApp
    </a>
  </div>

</div>

<a href="index.html" class="btn-volver">Volver al inicio</a>

</body>
</html>
