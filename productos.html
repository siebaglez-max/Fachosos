<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            padding: 60px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            width: calc(33.333% - 20px);
            margin: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card-title {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .card-description {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 class="card-title">Producto 1</h2>
            <p class="card-description">Descripción del producto 1.</p>
        </div>
        <div class="card">
            <h2 class="card-title">Producto 2</h2>
            <p class="card-description">Descripción del producto 2.</p>
        </div>
        <div class="card">
            <h2 class="card-title">Producto 3</h2>
            <p class="card-description">Descripción del producto 3.</p>
        </div>
        <!-- Add more products as necessary -->
    </div>
</body>
</html>
