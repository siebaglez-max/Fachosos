<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FACHOSOS | Productos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family:'Montserrat',sans-serif;
  padding:90px 30px 60px;
  overflow-x:hidden;
}

/* LED DE FONDO */
.graffiti-line{
  position:fixed;
  width:160vw;
  height:var(--h);
  top:var(--t);
  left:-60vw;
  background:var(--c);
  transform:rotate(var(--r));
  animation:move var(--s) linear infinite;
  z-index:0;
}
@keyframes move{
  to{transform:translateX(120vw) rotate(var(--r));}
}

/* TÍTULO */
h2{
  position:relative;
  z-index:2;
  font-family:'Playfair Display',serif;
  font-size:38px;
  letter-spacing:6px;
  margin-bottom:80px;
  background:linear-gradient(90deg,#00aaff,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:center;
}

/* GRID */
.grid{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:50px;
  max-width:1300px;
  margin:auto;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border-radius:26px;
  padding:26px;
  text-decoration:none;
  color:#fff;
  backdrop-filter:blur(10px);
  box-shadow:0 0 18px rgba(0,200,255,.18), inset 0 0 14px rgba(255,79,216,.12);
  transition:.35s;
  display:flex;
  flex-direction:column;
}
.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 0 30px rgba(255,79,216,.35), inset 0 0 20px rgba(0,200,255,.25);
}

/* IMAGEN */
.img{
  height:420px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:25px;
}
.img img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  border-radius:20px;
  background:#000;
  box-shadow:0 0 8px rgba(0,200,255,.25), 0 0 18px rgba(255,79,216,.15);
}

/* TEXTO */
.card p{
  font-size:22px;
  letter-spacing:1px;
  margin-bottom:6px;
}
.card span{
  font-size:14px;
  opacity:.75;
}

/* CARRITO */
.carrito-icono{
  position:fixed;
  top:25px;
  right:25px;
  z-index:3;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 0 18px rgba(0,200,255,.4);
}
.contador{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#ff4fd8;
  color:#000;
  width:20px;
  height:20px;
  border-radius:50%;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PANEL CARRITO */
.carrito-panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  display:none;
  flex-direction:column;
  align-items:center;
  padding:50px 20px;
  z-index:5;
  overflow-y:auto;
}
.carrito-panel h3{
  letter-spacing:6px;
  margin-bottom:30px;
  background:linear-gradient(90deg,#66ccff,#ff66cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.lista-carrito{
  width:100%;
  max-width:900px;
  list-style:none;
}
.carrito-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,.06);
  padding:18px 22px;
  border-radius:18px;
  margin-bottom:20px;
  box-shadow:0 0 18px rgba(0,200,255,.25);
}
.carrito-item img{
  width:90px;
  height:90px;
  object-fit:contain;
  border-radius:14px;
}
.item-info{
  display:flex;
  align-items:center;
  gap:10px;
}
.btn-eliminar{
  border:1px solid #ff4fd8;
  background:none;
  color:#fff;
  padding:6px 14px;
  border-radius:10px;
  cursor:pointer;
}
.btn-eliminar:hover{
  background:#ff4fd8;
  color:#000;
}
.total{
  margin-top:30px;
  font-size:20px;
}

/* BOTÓN WHATSAPP */
#btnComprar{
  display:block;
  margin-top:20px;
  padding:12px;
  border-radius:14px;
  border:none;
  background:#ff4fd8;
  color:#000;
  cursor:pointer;
  width:90%;
  font-weight:bold;
}

/* CERRAR */
.cerrar-carrito{
  position:absolute;
  top:30px;
  right:40px;
  font-size:40px;
  cursor:pointer;
}

/* BART */
.bart{
  position:fixed;
  bottom:15px;
  right:15px;
  width:110px;
  opacity:.9;
  z-index:2;
}

/* FOOTER Y REDES */
.footer{
  margin-top:120px;
  text-align:center;
  font-size:15px;
  color:#aaa;
  letter-spacing:2px;
}
.lista-redes{
  display:none;
  margin-top:12px;
  gap:10px;
  flex-direction:column;
}
.lista-redes a, .lista-redes div{
  display:flex;
  align-items:center;
  gap:8px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}
.lista-redes a:hover{
  color:#00f0ff;
}
.icono-redes{
  width:20px;
  height:20px;
  filter: drop-shadow(0 0 3px #00f0ff);
}
.redes-toggle{
  cursor:pointer;
  margin-top:8px;
  font-size:14px;
  color:#ff4fd8;
}
</style>
</head>
<body>

<div class="graffiti-line" style="--r:20deg;--s:18s;--h:2px;--c:rgba(0,200,255,.4);--t:20%;"></div>
<div class="graffiti-line" style="--r:-35deg;--s:24s;--h:2px;--c:rgba(255,79,216,.35);--t:50%;"></div>

<h2>PRODUCTOS</h2>
<div class="grid" id="gridProductos"></div>

<div class="carrito-icono" onclick="toggleCarrito()">🛒
  <div class="contador" id="contador">0</div>
</div>

<div class="carrito-panel" id="carritoPanel">
  <span class="cerrar-carrito" onclick="toggleCarrito()">×</span>
  <h3>CARRITO</h3>
  <ul class="lista-carrito" id="listaCarrito"></ul>
  <div class="total">Total: $<span id="total">0</span> MXN</div>
  <button id="btnComprar">Comprar por WhatsApp</button>
</div>

<img src="bart.png" class="bart">

<!-- FOOTER CON REDES -->
<div class="footer">
  ©FACHOSOS
  <div class="redes-toggle" onclick="toggleRedes()">Redes Sociales ▼</div>
  <div class="lista-redes" id="listaRedes">
    <a href="https://www.instagram.com/fachosos_moda_juvenil?igsh=cjc4Zm4zMmlteGF4" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/24/174/174855.png" class="icono-redes"> Instagram: fachosos_moda_juvenil
    </a>
    <a href="https://www.tiktok.com/@fachosos.moda" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/24/3046/3046129.png" class="icono-redes"> TikTok: fachosos.moda
    </a>
    <a href="https://www.facebook.com/share/1HYZL7mdex/" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/24/174/174848.png" class="icono-redes"> Facebook: Fachosos Moda Juvenil
    </a>
    <div>
    </div>
  </div>
</div>

<script>
const productosGlobales=[
 {nombre:"SKINY",link:"Skiny.html",imagen:"Skiny azul claro1.png",precio:249},
 {nombre:"CARGO SKINY",link:"cargo skiny.html",imagen:"Cargo skiny1.png",precio:270},
 {nombre:"CHAMARRA",link:"chamarra.html",imagen:"Chamarra azul1.png",precio:360},
 {nombre:"JUMPER",link:"jumper.html",imagen:"Jumper1.png",precio:560},
 {nombre:"HOLGADO",link:"Holgado.html",imagen:"Holgado azul1.png",precio:289},
 {nombre:"CARGO",link:"Cargo.html",imagen:"Cargo azul1.png",precio:289},
 {nombre:"MOM",link:"Mom.html",imagen:"Mom1.png",precio:249}
];

function mostrarProductos(){
 const grid=document.getElementById("gridProductos");
 grid.innerHTML="";
 productosGlobales.forEach(p=>{
  grid.innerHTML+=`
   <a href="${p.link}" class="card">
    <div class="img"><img src="${p.imagen}"></div>
    <p>${p.nombre}</p>
    <span>Ver modelos</span>
   </a>`;
 });
}

function toggleCarrito(){
 const p=document.getElementById("carritoPanel");
 p.style.display=p.style.display==="flex"?"none":"flex";
}

function actualizarCarrito(){
 const carrito=JSON.parse(localStorage.getItem("carrito"))||[];
 const lista=document.getElementById("listaCarrito");
 const contador=document.getElementById("contador");
 const totalSpan=document.getElementById("total");
 const btnComprar=document.getElementById("btnComprar");
 lista.innerHTML="";
 let total=0;

 if(carrito.length===0){
  lista.innerHTML="<li>Cómprame algo 😔💔</li>";
  btnComprar.style.display="none";
 }else{
  carrito.forEach((item,i)=>{
   total+=Number(item.precio);
   lista.innerHTML+=`
    <li class="carrito-item">
     <div class="item-info">
      <img src="${item.imagen}">
      ${item.nombre} - 
      ${item.talla?('Talla '+item.talla):''} - $${item.precio}
     </div>
     <button class="btn-eliminar" onclick="eliminar(${i})">X</button>
    </li>`;
  });
  btnComprar.style.display="block";
 }
 contador.textContent=carrito.length;
 totalSpan.textContent=total;
}

function agregarAlCarrito(precio,nombre,imagen,talla=""){
 const carrito=JSON.parse(localStorage.getItem("carrito"))||[];
 carrito.push({precio,nombre,imagen,talla});
 localStorage.setItem("carrito",JSON.stringify(carrito));
 actualizarCarrito();
}

function eliminar(i){
 const carrito=JSON.parse(localStorage.getItem("carrito"))||[];
 carrito.splice(i,1);
 localStorage.setItem("carrito",JSON.stringify(carrito));
 actualizarCarrito();
}

document.getElementById("btnComprar").onclick=function(){
 const carrito=JSON.parse(localStorage.getItem("carrito"))||[];
 if(carrito.length===0) return;
 let mensaje="Hola, quiero hacer un pedido:\n";
 let total=0;
 carrito.forEach(item=>{
  mensaje+=`- ${item.nombre} ${item.talla?('Talla '+item.talla):''} $${item.precio}\n`;
  total+=Number(item.precio);
 });
 mensaje+=`Total: $${total} MXN`;
 const telefono="5215587806140"; 
 const url=`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
 window.open(url,"_blank");
}

function toggleRedes(){
 const lista=document.getElementById("listaRedes");
 lista.style.display = lista.style.display==="flex"?"none":"flex";
}

mostrarProductos();
actualizarCarrito();
</script>

</body>
</html>
