<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FACHOSOS | Bienvenida</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0; padding:0; box-sizing:border-box;}

body, html{
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
  font-family:'Permanent Marker', cursive;
}

/* Contenedor general */
.loader-container{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  transform: translateY(-40px);
  z-index:2;
}

/* LOGO GRANDE COMO EL EJEMPLO */
.logo-box{
  position:absolute;
  top:-100px;                 /* bien arriba */
  left:50%;
  transform:translateX(-50%);
  z-index:1;
}

.logo-box img{
  width:150vw;                /* CASI TODA LA PANTALLA */
  max-width:900px;           /* límite para que no se rompa */
  height:auto;
}

/* Cápsula del video */
.video-capsula{
  position:relative;
  width:260px;
  height:260px;
  border-radius:50%;
  overflow:hidden;
  margin-top:120px;          /* espacio para el logo grande */
  margin-bottom:14px;
  background: rgba(255,255,255,0.05);
  box-shadow: 
    0 0 70px rgba(0,200,255,0.9) inset,
    0 0 120px rgba(0,200,255,0.9);
  z-index:2;
}

.video-capsula::before{
  content:"";
  position:absolute;
  inset:-30px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(0,200,255,0.9), transparent 60%);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  50%{transform:scale(1.2);}
}

.video-capsula video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  position:relative;
  z-index:2;
}

/* Eslogan */
.eslogan{
  font-size:16px;
  margin-top:6px;
  background: linear-gradient(90deg, #ff66cc, #66ccff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:center;
  z-index:2;
}

/* Botón */
.btn-next{
  margin-top:18px;
  padding:10px 28px;
  font-family:'Playfair Display', serif;
  font-size:16px;
  background:#000;
  color:#cfcfcf;
  border:1px solid #777;
  border-radius:8px;
  text-decoration:none;
  letter-spacing:1px;
  z-index:2;
}

/* Botón audio */
.audio-btn{
  position:fixed;
  bottom:18px;
  left:18px;
  font-size:22px;
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
  z-index:3;
}

/* Graffiti */
.graffiti-line{
  position:absolute;
  width:160vw;
  height:var(--h);
  top:var(--t);
  left:-60vw;
  background:var(--c);
  transform:rotate(var(--r));
  animation:move var(--s) linear infinite;
  z-index:0;
}

@keyframes move{
  to{transform:translateX(120vw) rotate(var(--r));}
}
</style>
</head>

<body>

<!-- Graffiti -->
<div class="graffiti-line" style="--r:20deg;--s:14s;--h:3px;--c:rgba(255,0,0,.5);--t:10%;"></div>
<div class="graffiti-line" style="--r:-35deg;--s:20s;--h:2px;--c:rgba(0,255,255,.5);--t:30%;"></div>
<div class="graffiti-line" style="--r:50deg;--s:18s;--h:4px;--c:rgba(255,0,255,.5);--t:55%;"></div>
<div class="graffiti-line" style="--r:-70deg;--s:22s;--h:3px;--c:rgba(255,255,0,.4);--t:75%;"></div>

<div class="loader-container">

  <!-- LOGO GRANDE -->
  <div class="logo-box">
    <img src="logo.png" alt="Fachosos">
  </div>

  <div class="video-capsula">
    <video id="personajeVideo" src="personaje.mp4" loop muted></video>
  </div>

  <h2 class="eslogan">
    NO ES COMO TE VEN, ES COMO TÚ QUIERAS SENTIRTE
  </h2>

  <a href="productos.html" class="btn-next">Ver productos</a>
</div>

<button class="audio-btn" id="audioBtn">🔇</button>

<script>
const video = document.getElementById("personajeVideo");
const btn = document.getElementById("audioBtn");

video.play();

btn.onclick = () => {
  video.muted = !video.muted;
  btn.textContent = video.muted ? "🔈" : "🔊";
};
</script>

</body>
</html>
