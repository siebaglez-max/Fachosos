<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fachosos</title>
    <style>
        .flex-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 0;
            padding: 0;
        }
        .logo-box {
            position: relative; /* Changed from absolute to relative */
            margin: 0 auto; /* Center the logo box */
            /* Adjust margin as needed for spacing */
        }
        .logo {
            width: 100%;
            max-width: 300px;
            /* Adjust margins here for spacing between elements */
        }
        .video, .eslogan, .button {
            margin: 10px 0; /* Adjust for proper spacing between elements */
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="logo-box">
            <img src="logo.png" alt="Logo" class="logo">
        </div>
        <div class="video">
            <!-- Video element -->
        </div>
        <div class="eslogan">
            <!-- Eslogan text -->
        </div>
        <button class="button">Click me</button>
    </div>
</body>
</html>
